<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lord of Mystery Tarot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="oracle-panel" aria-labelledby="app-title">
        <div class="brand-mark" aria-hidden="true">
          <span></span>
          <i></i>
        </div>
        <p class="kicker">Tarot Reading Agent</p>
        <h1 id="app-title">Lord of Mystery Tarot</h1>
        <p class="intro">
          ใส่ชื่ออะไรก็ได้ แล้วเปิดไพ่ 1 ใบเพื่อรับเรื่องเล่าจากผู้ทำนายแห่งหมอก
        </p>

        <form id="reading-form" class="entry-form">
          <label for="seeker-name">ชื่อสำหรับพิธีเปิดไพ่</label>
          <div class="form-row">
            <input id="seeker-name" name="seekerName" maxlength="32" autocomplete="off" placeholder="เช่น นักเดินทาง, Moonchild, A" />
            <button type="submit">เริ่มเปิดไพ่</button>
          </div>
          <p class="daily-note">คำแนะนำ: ควรดูเพียงวันละครั้ง เพื่อให้คำทำนายมีน้ำหนักและไม่รบกวนสัญชาตญาณของตัวเอง</p>
        </form>

        <div class="control-row" hidden>
          <button id="future-button" class="secondary-button" type="button">เปิดไพ่เพิ่ม: อนาคตอันใกล้</button>
          <button id="reset-button" class="ghost-button" type="button">ล้างและเริ่มใหม่</button>
        </div>
      </section>

      <section class="reading-stage" aria-live="polite">
        <div id="deck-placeholder" class="deck-placeholder">
          <div class="deck-card back-card">
            <div class="sigil">☾</div>
            <div class="deck-lines"></div>
            <p>รอเสียงเรียกจากชื่อของคุณ</p>
          </div>
        </div>
        <div id="reading-list" class="reading-list"></div>
      </section>
    </main>

    <template id="reading-template">
      <article class="reading-card">
        <div class="tarot-card" aria-hidden="true">
          <div class="card-face">
            <div class="arcana-symbol"></div>
            <div class="card-number"></div>
            <div class="card-title"></div>
          </div>
        </div>
        <div class="reading-copy">
          <p class="reading-label"></p>
          <h2></h2>
          <p class="story"></p>
          <div class="forecast-grid"></div>
        </div>
      </article>
    </template>

    <script src="./app.js"></script>
  </body>
</html>
